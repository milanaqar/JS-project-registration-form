<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="icon" type="svg" href="journal-bookmark.svg">
    <link rel="stylesheet" href="style.css">
    <title>Guest Log</title>
</head>

<body>

    <!-- Form -->
    <div class="container py-5 my-4">
        <section class="add mx-auto p-4 border rounded-4 shadow-sm" style="max-width: 600px;">
            
            <h2 class="text-center mb-3">Guest Registration</h2>

            <form class="registration-form">

                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Full Name">
                    <p id="errorName" class="error-message small"></p>
                </div>

                <div class="mb-3">
                    <label for="age" class="form-label">Age</label>
                    <input type="number" class="form-control" id="age" placeholder="Age">
                    <p id="errorAge" class="error-message small"></p>
                </div>

                <div class="mb-3">
                    <label for="role" class="form-label">Role</label>
                    <input type="text" class="form-control" id="role" placeholder="Role">
                    <p id="errorRole" class="error-message small"></p>
                </div>

                <button id="addBtn" type="button" class="btn btn-primary w-100 mt-3">
                    <i class="bi bi-person-plus fs-5"></i> Add Guest
                </button>

            </form>
        </section>

        <!-- Statistics -->
        <!-- All info -->
        <section class="stats-all show mt-4 mx-auto p-4 border rounded-4 shadow-sm" style="max-width: 1000px;">
            
            <h3 class="mb-3">Guest List</h3>

            <p id="noGuests" class="no-guests-msg text-center">
               <i class="bi bi-people"></i> No guests registered
            </p>

            <ul id="showList" class="list-group mb-4 list-unstyled"></ul>

            <h4 class="mb-3">Statistics</h4>

            <div class="row g-3">

                <!-- Count -->
                <div class="col-md-4">
                    <div id="stats-total" class="stats-card p-3 border rounded-4 shadow-sm text-center">
                        <p>Total Guests</p>
                        <span id="totalGuests" class="fs-3">0</span>
                    </div>
                </div>

                <div class="col-md-4">
                    <div id="stats-adults" class="stats-card p-3 border rounded-4 shadow-sm text-center">
                        <p>Adults</p>
                        <span id="adultCount" class="fs-3">0</span>
                    </div>
                </div>

                <div class="col-md-4">
                    <div id="stats-minor" class="stats-card p-3 border rounded-4 shadow-sm text-center">
                        <p>Minors</p>
                        <span id="minorCount" class="fs-3">0</span>
                    </div>
                </div>

            </div>
        </section>
    </div>


    <script>

        // Capitalize first letter in Role
        function capitalize(word) {
            return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
        }

        // Capitalize Full Name
        function capitalizeFullName(name) {
            return name
                .split(" ")
                .filter(part => part.trim() !== "")
                .map(capitalize)
                .join(" ");
        }

        document.getElementById("addBtn").addEventListener("click", function() {
            addGuest();
        });

        enterKey();
        
        // Enter key 
        function enterKey() {

            // Enter go to Age
            document.getElementById("name").addEventListener("keydown", function(e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    document.getElementById("age").focus();
                }
            });

            // Enter go to Role
            document.getElementById("age").addEventListener("keydown", function(e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    document.getElementById("role").focus();
                }
            });

            // Enter Add Guest
            document.getElementById("role").addEventListener("keydown", function(e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    addGuest();
                }
            });
        }
        
        // Add Geust, Validation, empty fields
        function addGuest() {

            let hasError = false;

            document.getElementById("errorName").textContent = "";
            document.getElementById("errorAge").textContent = "";
            document.getElementById("errorRole").textContent = "";

            let nameInput = capitalizeFullName(document.getElementById("name").value);
            let ageInput = document.getElementById("age").value;
            let roleInput = capitalize(document.getElementById("role").value);

            // Validation
            if (nameInput === "") 
            {
                document.getElementById("errorName").textContent = "Please fill in all fields.";
                hasError = true;
            }

            if (isNaN(ageInput) || ageInput.trim() === "") 
            {
                document.getElementById("errorAge").textContent = "Age must be a number";
                hasError = true;
            }

            if (roleInput === "") 
            {
                document.getElementById("errorRole").textContent = "Please fill in all fields.";
                hasError = true;
            }

            if (hasError) return;

            // Create guest object
            let guest = 
            {
                name: nameInput,
                age: Number(ageInput),
                role: roleInput,
                isAdult: Number(ageInput) >= 18
            };

            guests.push(guest);
            displayGuests();

            // Store the geusts info
            localStorage.setItem("guests", JSON.stringify(guests));

            // Empty fields
            document.getElementById("name").value = "";
            document.getElementById("age").value = "";
            document.getElementById("role").value = "";
        }
        
        // Show inputs
        function displayGuests() 
        {

            let showList = document.getElementById("showList");
            let adultCount = 0;
            let minorCount = 0;

            showList.innerHTML = "";

            // Show or hide "No guests registered"
            if (guests.length === 0) 
            {
                document.getElementById("noGuests").style.display = "block";
            } else {
                document.getElementById("noGuests").style.display = "none";
            }
        


            guests.forEach(function(guest,index) 
            {

                let listItem = document.createElement("li");

                 listItem.innerHTML = 
                `
                <div class="d-flex justify-content-between align-items-center w-100"
                <span>
                 ${guest.name} - Age: ${guest.age}, Role: ${guest.role}, ${guest.isAdult ? "Adult" : "Minor"}
                </span>

                 <span>
                 <i class="delete bi bi-trash me-3 fs-5" onclick="deleteGuest(${index})"></i>
                 <i class="edit bi bi-pencil-square me-3 fs-5" onclick="editGuest(${index})"></i>
                 </span>
                </div>
                `;


                showList.appendChild(listItem);

                if (guest.isAdult) 
                {
                    adultCount++;
                } else 
                {
                    minorCount++;
                }
            });

            document.getElementById("totalGuests").textContent = guests.length;
            document.getElementById("adultCount").textContent = adultCount;
            document.getElementById("minorCount").textContent = minorCount;
        } 
         // Delete Guesst button
        function deleteGuest(index)
        {
            guests.splice(index,1);
            localStorage.setItem("guests",JSON.stringify(guests));
            displayGuests();

        }

        // Edit Guest button
        function editGuest(index)
        {
            let g = guests[index];

            document.getElementById("name").value = g.name;
            document.getElementById("age").value = g.age;
            document.getElementById("role").value = g.role;

            guests.splice(index,1);
            localStorage.setItem("guests", JSON.stringify(guests));
            displayGuests();
        }


        let guests = [];

        // Reload saved geusts
        let saved = localStorage.getItem("guests");

        if (saved)
        {
            guests = JSON.parse(saved);
            displayGuests();
        }
         

    </script>

<script src="https://cdn.jsdelivr.net/npm/sakura/dist/sakura.min.js"></script>
<script>
    new Sakura('body');
</script>


</body>
</html>
